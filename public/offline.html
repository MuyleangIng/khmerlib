<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Offline | KhmerLibrary</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f8f7f4;
        --card: #ffffff;
        --text: #1f2937;
        --muted: #6b7280;
        --accent: #c8502a;
        --border: #ead9ca;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        background:
          radial-gradient(circle at top, rgba(200, 80, 42, 0.12), transparent 42%),
          var(--bg);
        color: var(--text);
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        width: min(100%, 540px);
        border: 1px solid var(--border);
        border-radius: 28px;
        background: var(--card);
        padding: 32px 24px;
        box-shadow: 0 24px 60px rgba(31, 41, 55, 0.12);
        text-align: center;
      }

      .eyebrow {
        margin: 0 0 10px;
        color: var(--accent);
        font-size: 12px;
        font-weight: 800;
        letter-spacing: 0.18em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        font-size: clamp(28px, 6vw, 40px);
        line-height: 1.05;
      }

      p {
        margin: 14px 0 0;
        color: var(--muted);
        font-size: 16px;
        line-height: 1.65;
      }

      .actions {
        display: flex;
        justify-content: center;
        gap: 12px;
        flex-wrap: wrap;
        margin-top: 28px;
      }

      a,
      button {
        appearance: none;
        border: 1px solid var(--border);
        border-radius: 999px;
        min-height: 46px;
        padding: 0 18px;
        background: transparent;
        color: var(--text);
        font: inherit;
        font-weight: 700;
        cursor: pointer;
        text-decoration: none;
      }

      .primary {
        background: var(--accent);
        border-color: var(--accent);
        color: #fff;
      }
    </style>
  </head>
  <body>
    <main>
      <p class="eyebrow">Offline</p>
      <h1>No internet connection</h1>
      <p>
        KhmerLibrary could not reach the network. You can retry now or go back once your
        connection returns.
      </p>
      <div class="actions">
        <button type="button" class="primary" onclick="window.location.reload()">Try again</button>
        <a href="/">Go Home</a>
      </div>
    </main>
    <script>
      window.addEventListener("online", function () {
        window.location.reload();
      });
    </script>
  </body>
</html>

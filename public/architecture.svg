<svg width="1400" height="900" viewBox="0 0 1400 900" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">KhmerLib Architecture</title>
  <desc id="desc">Clean system architecture for KhmerLib using Vercel, Clerk, Next.js API routes, Cloudflare D1, and Cloudflare R2.</desc>
  <defs>
    <linearGradient id="pageBg" x1="0" y1="0" x2="1400" y2="900" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FAFC"/>
      <stop offset="0.55" stop-color="#EEF6FF"/>
      <stop offset="1" stop-color="#FFF7ED"/>
    </linearGradient>
    <linearGradient id="darkCard" x1="450" y1="130" x2="950" y2="300" gradientUnits="userSpaceOnUse">
      <stop stop-color="#111827"/>
      <stop offset="1" stop-color="#1E293B"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#0F172A" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2 2L10 6L2 10" stroke="#334155" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      .title { font: 800 36px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0F172A; }
      .subtitle { font: 500 17px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #475569; }
      .cardTitle { font: 800 22px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0F172A; }
      .cardText { font: 500 15px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #475569; }
      .cardSmall { font: 700 12px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #64748B; letter-spacing: 0.08em; }
      .whiteTitle { font: 800 24px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #FFFFFF; }
      .whiteText { font: 500 15px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #CBD5E1; }
      .laneTitle { font: 800 18px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #1E293B; }
      .stepNum { font: 800 15px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #FFFFFF; }
      .stepText { font: 600 14px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #334155; }
      .flowLabel { font: 700 13px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #334155; }
    </style>
  </defs>

  <rect width="1400" height="900" rx="34" fill="url(#pageBg)"/>
  <circle cx="160" cy="122" r="100" fill="#DBEAFE" opacity="0.55"/>
  <circle cx="1210" cy="760" r="150" fill="#FED7AA" opacity="0.45"/>

  <text x="80" y="74" class="title">KhmerLib Architecture</text>
  <text x="80" y="106" class="subtitle">Vercel hosts the app, Clerk protects admin access, Cloudflare D1 stores metadata, and Cloudflare R2 stores book media.</text>

  <rect x="80" y="140" width="1240" height="690" rx="32" fill="#FFFFFF" opacity="0.82" filter="url(#shadow)"/>

  <!-- Main system row -->
  <rect x="120" y="190" width="220" height="140" rx="24" fill="#EFF6FF" stroke="#BFDBFE" stroke-width="2"/>
  <text x="154" y="226" class="cardSmall">CLIENT</text>
  <text x="154" y="260" class="cardTitle">User Browser</text>
  <text x="154" y="287" class="cardText">Students read, search,</text>
  <text x="154" y="309" class="cardText">and install the PWA.</text>

  <rect x="430" y="178" width="540" height="164" rx="28" fill="url(#darkCard)" filter="url(#shadow)"/>
  <text x="470" y="218" class="cardSmall" fill="#94A3B8">HOSTING</text>
  <text x="470" y="254" class="whiteTitle">Vercel + Next.js</text>
  <text x="470" y="283" class="whiteText">Frontend pages and serverless API routes</text>
  <text x="470" y="309" class="whiteText">/, /books, /read/[id], /admin, /api/*</text>
  <path d="M894 226L928 286H860L894 226Z" fill="#FFFFFF"/>

  <rect x="1060" y="190" width="220" height="140" rx="24" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="2"/>
  <text x="1094" y="226" class="cardSmall">SOURCE CODE</text>
  <text x="1094" y="260" class="cardTitle">GitHub</text>
  <text x="1094" y="287" class="cardText">Commit and push</text>
  <text x="1094" y="309" class="cardText">to deploy updates.</text>

  <path d="M340 260H430" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="362" y="242" class="flowLabel">HTTPS</text>
  <path d="M970 260H1060" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="997" y="242" class="flowLabel">git push</text>

  <!-- Service row -->
  <rect x="130" y="430" width="250" height="150" rx="26" fill="#F0FDF4" stroke="#BBF7D0" stroke-width="2" filter="url(#shadow)"/>
  <text x="166" y="468" class="cardSmall">AUTH</text>
  <text x="166" y="504" class="cardTitle">Clerk</text>
  <text x="166" y="532" class="cardText">Sign in / sign up</text>
  <text x="166" y="555" class="cardText">Admin session control</text>
  <circle cx="326" cy="488" r="22" fill="#DCFCE7" stroke="#16A34A" stroke-width="2"/>
  <path d="M316 488L324 496L338 479" stroke="#16A34A" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <rect x="492" y="410" width="416" height="190" rx="28" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="2" filter="url(#shadow)"/>
  <text x="532" y="450" class="cardSmall">BACKEND</text>
  <text x="532" y="486" class="cardTitle">Next.js API Routes</text>
  <text x="532" y="516" class="cardText">Search, create books, likes, uploads</text>
  <text x="532" y="540" class="cardText">Routes validate input and call services</text>
  <rect x="742" y="462" width="112" height="84" rx="18" fill="#E0F2FE" stroke="#BAE6FD" stroke-width="2"/>
  <text x="770" y="496" class="flowLabel">/api</text>
  <text x="764" y="520" class="cardText">routes</text>

  <rect x="1020" y="430" width="250" height="150" rx="26" fill="#FFF7ED" stroke="#FED7AA" stroke-width="2" filter="url(#shadow)"/>
  <text x="1056" y="468" class="cardSmall">FILE STORAGE</text>
  <text x="1056" y="504" class="cardTitle">Cloudflare R2</text>
  <text x="1056" y="532" class="cardText">Covers, PDFs, audio,</text>
  <text x="1056" y="555" class="cardText">and content images</text>

  <path d="M620 342V410" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="638" y="379" class="flowLabel">API requests</text>
  <path d="M380 505H492" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="402" y="486" class="flowLabel">admin check</text>
  <path d="M908 505H1020" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="925" y="486" class="flowLabel">signed upload</text>

  <!-- Database row -->
  <rect x="370" y="664" width="660" height="96" rx="28" fill="#FFFBEB" stroke="#FDE68A" stroke-width="2" filter="url(#shadow)"/>
  <text x="410" y="704" class="cardSmall">DATABASE</text>
  <text x="410" y="738" class="cardTitle">Cloudflare D1</text>
  <text x="650" y="716" class="cardText">Stores books, categories, likes, bookmarks,</text>
  <text x="650" y="740" class="cardText">reading progress, and public R2 URLs.</text>
  <path d="M700 600V664" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="718" y="637" class="flowLabel">SQL query / insert</text>

  <!-- Process lane -->
  <text x="130" y="804" class="laneTitle">Main Process</text>
  <line x1="270" y1="798" x2="1210" y2="798" stroke="#CBD5E1" stroke-width="3"/>

  <circle cx="300" cy="798" r="17" fill="#2563EB"/>
  <text x="295" y="804" class="stepNum">1</text>
  <text x="326" y="803" class="stepText">Open app on Vercel</text>

  <circle cx="505" cy="798" r="17" fill="#16A34A"/>
  <text x="500" y="804" class="stepNum">2</text>
  <text x="531" y="803" class="stepText">Login with Clerk</text>

  <circle cx="700" cy="798" r="17" fill="#111827"/>
  <text x="695" y="804" class="stepNum">3</text>
  <text x="726" y="803" class="stepText">API routes process data</text>

  <circle cx="925" cy="798" r="17" fill="#F59E0B"/>
  <text x="920" y="804" class="stepNum">4</text>
  <text x="951" y="803" class="stepText">D1 saves metadata</text>

  <circle cx="1110" cy="798" r="17" fill="#EA580C"/>
  <text x="1105" y="804" class="stepNum">5</text>
  <text x="1136" y="803" class="stepText">R2 serves files</text>
</svg>

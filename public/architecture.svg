<svg width="1280" height="860" viewBox="0 0 1280 860" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">KhmerLib Vercel and Cloudflare Architecture</title>
  <desc id="desc">Architecture diagram showing users accessing KhmerLib through Vercel, Clerk authentication, Next.js API routes, Cloudflare D1 database, and Cloudflare R2 storage.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="860" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FAFC"/>
      <stop offset="0.45" stop-color="#EEF6FF"/>
      <stop offset="1" stop-color="#FFF7ED"/>
    </linearGradient>
    <linearGradient id="vercel" x1="280" y1="175" x2="1000" y2="340" gradientUnits="userSpaceOnUse">
      <stop stop-color="#101827"/>
      <stop offset="1" stop-color="#1E293B"/>
    </linearGradient>
    <linearGradient id="cloudflare" x1="260" y1="550" x2="1020" y2="730" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFF7ED"/>
      <stop offset="1" stop-color="#FFEDD5"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#0F172A" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2 2L10 6L2 10" stroke="#334155" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrowBlue" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2 2L10 6L2 10" stroke="#2563EB" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      .title { font: 800 34px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0F172A; }
      .subtitle { font: 500 16px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #475569; }
      .section { font: 800 18px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0F172A; }
      .label { font: 800 17px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0F172A; }
      .small { font: 500 13px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #475569; }
      .tiny { font: 700 11px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #64748B; letter-spacing: 0.08em; }
      .whiteTitle { font: 800 24px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #FFFFFF; }
      .whiteText { font: 500 14px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #CBD5E1; }
      .pill { font: 800 12px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #334155; letter-spacing: 0.06em; }
      .flowText { font: 700 13px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #1E293B; }
    </style>
  </defs>

  <rect width="1280" height="860" rx="36" fill="url(#bg)"/>
  <circle cx="110" cy="120" r="90" fill="#DBEAFE" opacity="0.65"/>
  <circle cx="1150" cy="760" r="130" fill="#FED7AA" opacity="0.55"/>
  <circle cx="1080" cy="120" r="72" fill="#DCFCE7" opacity="0.6"/>

  <text x="80" y="72" class="title">KhmerLib Architecture</text>
  <text x="80" y="101" class="subtitle">Next.js on Vercel, Clerk authentication, Cloudflare D1 metadata, and Cloudflare R2 media storage.</text>

  <rect x="80" y="140" width="1120" height="650" rx="30" fill="white" opacity="0.78" filter="url(#shadow)"/>

  <rect x="120" y="178" width="205" height="126" rx="24" fill="#EFF6FF" stroke="#BFDBFE" stroke-width="2"/>
  <text x="150" y="214" class="tiny">CLIENT</text>
  <text x="150" y="244" class="label">Student/User</text>
  <text x="150" y="268" class="small">Browser, mobile, PWA</text>
  <text x="150" y="290" class="small">Reads and searches books</text>
  <path d="M165 205C172 190 195 190 202 205C213 204 222 213 222 224C222 235 213 244 202 244H166C154 244 144 235 144 223C144 212 153 204 165 205Z" fill="#DBEAFE" stroke="#2563EB" stroke-width="2"/>

  <rect x="280" y="168" width="720" height="184" rx="28" fill="url(#vercel)" filter="url(#shadow)"/>
  <text x="320" y="214" class="tiny" fill="#94A3B8">HOSTING LAYER</text>
  <text x="320" y="248" class="whiteTitle">Vercel</text>
  <text x="320" y="274" class="whiteText">Hosts the Next.js frontend and serverless API route runtime.</text>
  <rect x="320" y="296" width="160" height="34" rx="17" fill="#FFFFFF" opacity="0.12"/>
  <text x="344" y="318" class="whiteText">/ books / read</text>
  <rect x="500" y="296" width="164" height="34" rx="17" fill="#FFFFFF" opacity="0.12"/>
  <text x="524" y="318" class="whiteText">/ admin</text>
  <rect x="684" y="296" width="188" height="34" rx="17" fill="#FFFFFF" opacity="0.12"/>
  <text x="708" y="318" class="whiteText">/ api routes</text>
  <path d="M908 213L940 270H876L908 213Z" fill="#FFFFFF"/>

  <rect x="1044" y="188" width="116" height="96" rx="22" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="2"/>
  <text x="1074" y="228" class="label">GitHub</text>
  <text x="1062" y="252" class="small">push code</text>
  <text x="1062" y="272" class="small">deploy app</text>

  <path d="M325 240H267" stroke="#2563EB" stroke-width="3" marker-end="url(#arrowBlue)"/>
  <text x="214" y="156" class="flowText">HTTPS</text>
  <path d="M1000 236H1044" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="1010" y="215" class="small">git push</text>

  <rect x="150" y="412" width="238" height="128" rx="24" fill="#F0FDF4" stroke="#BBF7D0" stroke-width="2" filter="url(#shadow)"/>
  <text x="184" y="449" class="tiny">AUTHENTICATION</text>
  <text x="184" y="481" class="label">Clerk</text>
  <text x="184" y="505" class="small">Sign in and sign up</text>
  <text x="184" y="527" class="small">Admin session check</text>
  <circle cx="340" cy="457" r="18" fill="#DCFCE7" stroke="#16A34A" stroke-width="2"/>
  <path d="M331 457L338 464L351 449" stroke="#16A34A" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <rect x="476" y="400" width="328" height="154" rx="26" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="2" filter="url(#shadow)"/>
  <text x="516" y="439" class="tiny">BACKEND</text>
  <text x="516" y="471" class="label">Next.js API Routes</text>
  <text x="516" y="497" class="small">/api/search, /api/admin/books</text>
  <text x="516" y="519" class="small">/api/admin/uploads/sign</text>
  <text x="516" y="541" class="small">Validates requests and coordinates data</text>
  <rect x="724" y="428" width="44" height="44" rx="12" fill="#E0F2FE"/>
  <path d="M736 450H756M736 438H756M736 462H748" stroke="#0284C7" stroke-width="3" stroke-linecap="round"/>

  <path d="M582 352V400" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="600" y="382" class="small">API calls</text>
  <path d="M322 412L482 352" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="365" y="370" class="small">Clerk session</text>
  <path d="M388 474H476" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="403" y="455" class="small">admin allowed?</text>

  <rect x="876" y="404" width="254" height="144" rx="26" fill="#FFF7ED" stroke="#FED7AA" stroke-width="2" filter="url(#shadow)"/>
  <text x="916" y="443" class="tiny">PUBLIC MEDIA</text>
  <text x="916" y="475" class="label">Cloudflare R2</text>
  <text x="916" y="501" class="small">Covers, PDFs, audio, images</text>
  <text x="916" y="523" class="small">S3-compatible object storage</text>
  <path d="M1075 443C1075 434 1043 428 1014 428C985 428 953 434 953 443V503C953 512 985 518 1014 518C1043 518 1075 512 1075 503V443Z" fill="#FFEDD5" stroke="#EA580C" stroke-width="2"/>
  <path d="M953 443C953 452 985 458 1014 458C1043 458 1075 452 1075 443" stroke="#EA580C" stroke-width="2"/>
  <path d="M804 476H876" stroke="#EA580C" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="820" y="456" class="small">signed upload</text>

  <rect x="286" y="614" width="708" height="116" rx="30" fill="url(#cloudflare)" stroke="#FDBA74" stroke-width="2" filter="url(#shadow)"/>
  <text x="332" y="653" class="tiny">DATABASE</text>
  <text x="332" y="685" class="label">Cloudflare D1</text>
  <text x="332" y="710" class="small">SQLite metadata: books, likes, bookmarks, reading progress, R2 URLs</text>
  <rect x="800" y="642" width="118" height="58" rx="16" fill="#FFFFFF" opacity="0.72" stroke="#FDBA74"/>
  <text x="829" y="666" class="pill">BOOKS</text>
  <text x="825" y="689" class="small">SQL rows</text>
  <path d="M640 554V614" stroke="#EA580C" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="660" y="590" class="small">query / insert</text>

  <rect x="118" y="620" width="116" height="76" rx="18" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="2"/>
  <text x="148" y="650" class="pill">SEARCH</text>
  <text x="140" y="674" class="small">LIKE query</text>
  <path d="M234 658H286" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>

  <rect x="1040" y="622" width="126" height="76" rx="18" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="2"/>
  <text x="1076" y="652" class="pill">READ</text>
  <text x="1062" y="676" class="small">metadata + media</text>
  <path d="M994 660H1040" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>

  <rect x="140" y="752" width="1000" height="2" fill="#CBD5E1"/>
  <circle cx="188" cy="752" r="8" fill="#2563EB"/>
  <circle cx="388" cy="752" r="8" fill="#16A34A"/>
  <circle cx="588" cy="752" r="8" fill="#0F172A"/>
  <circle cx="788" cy="752" r="8" fill="#EA580C"/>
  <circle cx="988" cy="752" r="8" fill="#F97316"/>
  <text x="162" y="784" class="small">1. User opens app</text>
  <text x="346" y="784" class="small">2. Clerk verifies admin</text>
  <text x="528" y="784" class="small">3. API routes process</text>
  <text x="726" y="784" class="small">4. D1 saves metadata</text>
  <text x="928" y="784" class="small">5. R2 serves files</text>
</svg>
